<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locais de Estágio — IF Baiano GMB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

  header { background: #166534; color: white; padding: 18px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 12px; opacity: .7; margin-top: 1px; }
  .header-right { margin-left: auto; font-size: 11px; opacity: .6; text-align: right; }

  .top-bar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .top-bar label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 4px; }
  select, input[type=text] { font-family: 'Inter', sans-serif; font-size: 13px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 8px 11px; color: #1e293b; outline: none; transition: border-color .15s; width: 100%; }
  select:focus, input:focus { border-color: #16a34a; background: #fff; }
  
  .fg { display: flex; flex-direction: column; }
  .fg-curso { width: 280px; } .fg-cidade { width: 200px; } .fg-busca { width: 220px; } .fg-status { width: 170px; }
  .btn-limpar { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: 7px; border: 1.5px solid #e2e8f0; background: none; cursor: pointer; color: #64748b; align-self: flex-end; transition: all .15s; }
  .btn-limpar:hover { border-color: #16a34a; color: #15803d; background: #f0fdf4; }
  .btn-reload { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: 7px; border: 1.5px solid #bbf7d0; background: #f0fdf4; cursor: pointer; color: #15803d; align-self: flex-end; transition: all .15s; }

  .tabs { padding: 12px 24px 0; display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 6px 6px 0 0; border: 1.5px solid transparent; background: none; cursor: pointer; color: #64748b; transition: all .15s; }
  .tab.ativo { background: #fff; border-color: #e2e8f0; border-bottom-color: #fff; color: #166534; font-weight: 600; }

  .conteudo { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 0 8px 8px 8px; margin: 0 24px 24px; overflow: hidden; }
  .resultado-info { padding: 10px 16px; font-size: 12px; color: #64748b; border-bottom: 1px solid #f1f5f9; background: #f8fafc; display: flex; align-items: center; justify-content: space-between; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 14px; background: #f8fafc; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
  tbody tr:hover { background: #f8fafc; }
  td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }

  .local-nome { font-weight: 600; color: #0f172a; }
  .concedente { font-size: 11px; color: #64748b; margin-top: 2px; }

  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; }
  .badge-valido   { background: #dcfce7; color: #15803d; }
  .badge-proximo  { background: #fef3c7; color: #b45309; }
  .badge-expirado { background: #fee2e2; color: #b91c1c; }

  /* Estilo do botão de Ateste */
  .btn-ateste { background: #166534; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; transition: background 0.2s; }
  .btn-ateste:hover { background: #15803d; }

  .loading { padding: 48px; text-align: center; color: #64748b; }
  .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: #16a34a; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div>🌱</div>
  <div>
    <h1>Locais de Estágio</h1>
    <p>IF Baiano — Campus Governador Mangabeira</p>
  </div>
  <div class="header-right" id="ultimaAtualizacao"></div>
</header>

<div class="top-bar">
  <div class="fg fg-curso"><label>Curso</label><select id="selCurso" onchange="filtrar()" disabled><option value="">Carregando...</option></select></div>
  <div class="fg fg-cidade"><label>Cidade</label><select id="selCidade" onchange="filtrar()" disabled><option value="">Carregando...</option></select></div>
  <div class="fg fg-busca"><label>Buscar</label><input type="text" id="busca" placeholder="Nome do local..." oninput="filtrar()" disabled></div>
  <div class="fg fg-status">
    <label>Mostrar</label>
    <select id="selMostrar" onchange="filtrar()" disabled>
      <option value="">Todos os status</option>
      <option value="valido">✅ Somente válidos</option>
      <option value="proximo">⚠️ Próximos do venc.</option>
      <option value="expirado">❌ Somente expirados</option>
    </select>
  </div>
  <button class="btn-limpar" onclick="limpar()">✕ Limpar</button>
  <button class="btn-reload" onclick="carregarDados()">↻ Atualizar</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab ativo" data-tab="todos" onclick="mudarTab(this)">Todos</button>
  <button class="tab" data-tab="valido" onclick="mudarTab(this)">✅ Válidos</button>
  <button class="tab" data-tab="proximo" onclick="mudarTab(this)">⚠️ A vencer</button>
  <button class="tab" data-tab="expirado" onclick="mudarTab(this)">❌ Expirados</button>
</div>

<div class="conteudo">
  <div class="resultado-info" id="resultInfo"></div>
  <div id="estadoContainer"></div>
  <table id="tabela" style="display:none">
    <thead>
      <tr>
        <th>Local / Empresa</th>
        <th>Curso</th>
        <th>Cidade</th>
        <th>Validade</th>
        <th>Documento</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
// --- CONFIGURAÇÃO E DADOS ---
const URL_T1 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLGLd6VicHaXxND5GBNkr1lTA-2Lrw-iU79BA3KPQI4TBDQGTTFAgBX0cwfLUICQq3lSUDdURitobb/pub?gid=1034620908&single=true&output=csv';
const URL_T2 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLGLd6VicHaXxND5GBNkr1lTA-2Lrw-iU79BA3KPQI4TBDQGTTFAgBX0cwfLUICQq3lSUDdURitobb/pub?gid=0&single=true&output=csv';

const LABEL = {valido:'✅ Válido', proximo:'⚠️ A vencer', expirado:'❌ Expirado', sem_data:'— Sem data'};
const RANK  = {valido:0, proximo:1, expirado:2, sem_data:3};

let DADOS = [];
let RESULTADO_FILTRADO = []; 
let tabAtual = 'todos';

// --- UTILITÁRIOS ---
function fixEncoding(str) { try { return decodeURIComponent(escape(str)); } catch(e) { return str; } }

function splitCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') inQ = !inQ; 
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; } 
    else cur += c;
  }
  result.push(cur); return result;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitCSVLine(lines[0]).map(h => fixEncoding(h.trim().replace(/^"|"$/g,'')));
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line).map(v => fixEncoding(v.trim().replace(/^"|"$/g,'')));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function parseDate(dateStr) {
  if (!dateStr || dateStr.trim() === '') return null;
  const parts = dateStr.trim().split('/');
  if (parts.length === 3) return new Date(parts[2], parts[1]-1, parts[0]);
  return null;
}

function calcStatus(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return 'sem_data';
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diff = Math.floor((d - hoje) / 86400000);
  if (diff < 0) return 'expirado';
  if (diff <= 90) return 'proximo';
  return 'valido';
}

// --- CARREGAMENTO ---
async function carregarDados() {
  document.getElementById('estadoContainer').innerHTML = '<div class="loading"><div class="spinner"></div>Carregando dados...</div>';
  try {
    const [r1, r2] = await Promise.all([fetch(URL_T1+'&t='+Date.now()), fetch(URL_T2+'&t='+Date.now())]);
    const t1 = parseCSV(await r1.text());
    const t2 = parseCSV(await r2.text());

    const empresas = {};
    t1.forEach(row => {
      const nome = (row['Nome/Razão social'] || row['Nome/RazÃ£o social'] || '').trim().toLowerCase();
      if(nome) empresas[nome] = row;
    });

    DADOS = t2.map(row => {
      const conc = (row['Nome/Razão social'] || row['Nome/RazÃ£o social'] || '').trim();
      const emp = empresas[conc.toLowerCase()] || {};
      const fim = row['vigencia - fim'] || '';
      return {
        concedente: conc,
        local: (row['local para estagio'] || conc).trim(),
        curso: (row['Curso'] || '').trim(),
        cidade: (emp['Cidade'] || '').trim(),
        cnpj: (emp['CNPJ'] || emp['cnpj'] || '').trim(),
        email: (emp['Email'] || '').trim(),
        telefone: (emp['Telefone'] || '').trim(),
        fim: fim,
        status: calcStatus(fim)
      };
    }).filter(d => d.concedente);

    popularFiltros();
    habilitar(true);
    filtrar();
    document.getElementById('ultimaAtualizacao').textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;
  } catch (e) { document.getElementById('estadoContainer').innerHTML = 'Erro ao carregar planilha.'; }
}

function popularFiltros() {
  const cursos = [...new Set(DADOS.map(d=>d.curso))].sort();
  const cidades = [...new Set(DADOS.map(d=>d.cidade))].sort();
  document.getElementById('selCurso').innerHTML = '<option value="">Todos os cursos</option>' + cursos.map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('selCidade').innerHTML = '<option value="">Todas as cidades</option>' + cidades.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function filtrar() {
  const curso = document.getElementById('selCurso').value;
  const cidade = document.getElementById('selCidade').value;
  const busca = document.getElementById('busca').value.toLowerCase();
  const mostrar = document.getElementById('selMostrar').value;

  RESULTADO_FILTRADO = DADOS.filter(d => {
    if (tabAtual !== 'todos' && d.status !== tabAtual) return false;
    if (mostrar && d.status !== mostrar) return false;
    if (curso && d.curso !== curso) return false;
    if (cidade && d.cidade !== cidade) return false;
    if (busca && !d.local.toLowerCase().includes(busca) && !d.concedente.toLowerCase().includes(busca)) return false;
    return true;
  });

  document.getElementById('estadoContainer').style.display = 'none';
  document.getElementById('tabela').style.display = 'table';
  document.getElementById('tbody').innerHTML = RESULTADO_FILTRADO.map((d, i) => `
    <tr>
      <td><div class="local-nome">${d.local}</div><div class="concedente">${d.concedente}</div></td>
      <td>${d.curso}</td>
      <td>${d.cidade || '—'}</td>
      <td><span class="badge badge-${d.status}">${d.fim || '—'}</span></td>
      <td><button class="btn-ateste" onclick="gerarAteste(${i})">📄 Ateste</button></td>
    </tr>
  `).join('');
  document.getElementById('resultInfo').innerHTML = `<strong>${RESULTADO_FILTRADO.length}</strong> locais encontrados.`;
}

// --- GERAÇÃO DO PDF (MODELO OFICIAL) ---
function gerarAteste(idx) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const d = RESULTADO_FILTRADO[idx];

  // Cabeçalho institucional (Recriando fielmente o seu modelo)
  doc.setFont("helvetica", "bold");
  doc.setFontSize(11);
  doc.text("INSTITUTO FEDERAL", 20, 15);
  doc.setFont("helvetica", "normal");
  doc.text("Baiano", 20, 20);

  doc.setFont("helvetica", "bold");
  doc.setFontSize(12);
  doc.text("ATESTE DE CAMPO DE ESTÁGIO", 105, 30, { align: "center" });

  // Instituição de Ensino
  doc.setFontSize(9);
  doc.setFont("helvetica", "bold");
  doc.text("INSTITUIÇÃO DE ENSINO", 20, 40);
  
  doc.setFont("helvetica", "normal");
  doc.text("Nome: INSTITUTO FEDERAL DE EDUCAÇÃO, CIÊNCIA E TECNOLOGIA BAIANO - IFBAIANO", 20, 46);
  doc.text("Fone: (75) 3638-2012   Email: gabinete@gm.ifbaiano.edu.br", 20, 51);
  doc.text("CNPJ: 10.724.903/0011-40", 20, 56);
  doc.text("Endereço: Rua Waldemar Mascarenhas, s/n, Portão, Governador Mangabeira - BA", 20, 61);

  // Declaração
  const texto = "Declaro que avaliei as instalações da CONCEDENTE DE ESTÁGIO abaixo identificada, razão pela qual, atesto sua adequação como campo de estágio curricular obrigatório adequado à formação cultural e profissional dos Alunos Estagiários do IFBAIANO:";
  doc.text(doc.splitTextToSize(texto, 170), 20, 72);

  // Dados da Concedente
  doc.setFont("helvetica", "bold");
  doc.text("CONCEDENTE DE ESTÁGIO", 20, 88);
  doc.setFont("helvetica", "normal");
  doc.text(`Nome: ${d.concedente}`, 20, 95);
  doc.text(`Local do Estágio: ${d.local}`, 20, 102);
  doc.text(`Fone: ${d.telefone || "__________"}   Email: ${d.email || "__________"}`, 20, 109);
  doc.text(`CNPJ: ${d.cnpj || "____________________"}`, 20, 116);
  doc.text(`Curso: ____________________________________________________`, 20, 123);

  // Quadro Justificativa
  doc.setFont("helvetica", "bold");
  doc.text("Justificativa Técnica:", 20, 133);
  doc.rect(20, 136, 170, 35);

  // Rodapé e Assinaturas
  doc.text("Amplitude do Ateste: ______________  Qtde estagiários: ____", 20, 185);
  doc.text("Data da emissão: ____/____/________   Validade: ____/____/________", 20, 195);
  
  doc.line(20, 225, 90, 225);
  doc.text("Responsável pelo Ateste", 35, 230);
  doc.text("SIAPE/Formação: ___________________", 20, 235);

  doc.line(120, 225, 190, 225);
  doc.text("Aval do NURI", 145, 230);

  doc.save(`Ateste_${d.local}.pdf`);
}

function mudarTab(btn) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo')); btn.classList.add('ativo'); tabAtual = btn.dataset.tab; filtrar(); }
function limpar() { document.getElementById('busca').value=''; filtrar(); }
function habilitar(s) { ['selCurso','selCidade','busca','selMostrar'].forEach(id=>document.getElementById(id).disabled=!s); }
carregarDados();
</script>
</body>
</html>
